      <h1>Calculadora</h1>

        <button>8</button>
        <button>9</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>3</button>

        <button>0</button>
        <button>,</button>
        <button>/</button>
        <button>=</button>

    </main>
