<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Lista de tarefas</title>
  </head>
  <body id="body">
    <section>
      <h2>Lista de tarefa</h2>
      <form id="form">
        <input
          type="text"
          name="task"
          id="task"
          placeholder="Digite aqui sua tarefa" />
        <button type="submit" onclick="AddTask(event)">
          <svg
            class="icon"
            xmlns="http://www.w3.org/2000/svg"
            x="0px"
            y="0px"
            width="32"
            height="32"
            viewBox="0 0 50 50"
            style="fill: #228be6">
            <path
              d="M25,2C12.317,2,2,12.317,2,25s10.317,23,23,23s23-10.317,23-23S37.683,2,25,2z M37,26H26v11h-2V26H13v-2h11V13h2v11h11V26z"></path>
          </svg>
        </button>
      </form>
      <div id="taskList"></div>
    </section>
    <script src="./assets/js/scripts.jsx"></script>
  </body>
</html>
